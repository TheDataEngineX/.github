name: 🐛 Bug Report
description: Report a bug in any TheDataEngineX product
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product is affected?
      options:
        - dataenginex
        - dex-studio
        - infradex
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "What version are you using? (e.g. 0.6.0)"
      placeholder: "0.6.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Environment
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.12.0"
