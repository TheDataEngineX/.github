name: Helm Release

on:
  workflow_call:
    inputs:
      chart-path:
        description: "Path to the Helm chart directory"
        required: true
        type: string
      chart-version:
        description: "Chart version to release"
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint ${{ inputs.chart-path }}

  package:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Package chart
        run: helm package ${{ inputs.chart-path }} --version ${{ inputs.chart-version }}

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: "*.tgz"

  publish:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: helm-chart

      - uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to GHCR OCI registry
        run: |
          CHART_FILE=$(ls *.tgz)
          helm push "$CHART_FILE" oci://ghcr.io/${{ github.repository_owner }}/charts
