name: Auto PR — branch → main (reusable)

on:
  workflow_call:

jobs:
  create-pr:
    name: Create PR to main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD: ${{ github.ref_name }}
        run: |
          if echo "$HEAD" | grep -qE '^fix[-/]'; then
            TITLE="fix: $(echo "$HEAD" | sed 's|^fix[-/]||;s|-| |g')"
          elif echo "$HEAD" | grep -qE '^feat[-/]'; then
            TITLE="feat: $(echo "$HEAD" | sed 's|^feat[-/]||;s|-| |g')"
          else
            TITLE="feat: $(echo "$HEAD" | sed 's|-| |g')"
          fi

          echo "PR title: $TITLE"

          PR_NUMBER=$(gh pr list \
            --base main \
            --head "$HEAD" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "PR #$PR_NUMBER already exists"
          else
            BODY="Automated PR: ${HEAD} → main. Review the preview environment before merging."
            gh pr create \
              --base main \
              --head "$HEAD" \
              --title "$TITLE" \
              --body "$BODY"

            PR_NUMBER=$(gh pr list \
              --base main \
              --head "$HEAD" \
              --state open \
              --json number \
              --jq '.[0].number')
            echo "Created PR #$PR_NUMBER"
          fi
