name: Label Sync

on:
  push:
    branches: [main]
    paths: [labels.yml]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Sync labels across org repos
        uses: EndBug/label-sync@v2
        with:
          config-file: labels.yml
          delete-other-labels: false
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
