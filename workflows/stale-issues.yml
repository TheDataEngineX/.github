name: Stale Issues

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had activity in the last 60 days. It will be closed in 30 days if no
            further activity occurs. If this issue is still relevant, please
            comment or update it.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had activity in the last 60 days. It will be closed in 30 days
            if no further activity occurs.
          close-issue-message: "Closed due to inactivity. Reopen if still relevant."
          close-pr-message: "Closed due to inactivity. Reopen if still relevant."
          days-before-stale: 60
          days-before-close: 30
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "priority: P1,status: blocked"
          exempt-pr-labels: "priority: P1,status: blocked"
