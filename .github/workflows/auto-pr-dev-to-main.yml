# Reusable workflow — auto-creates a PR from dev → main and enables auto-merge.
# Triggered on every push to dev (i.e., after a feature PR is merged to dev).
# Uses merge commit (not squash) to preserve individual conventional commits for
# release-please to read when determining the next version bump.
#
# Prerequisites (one-time per repo, GitHub UI):
#   1. Settings → General → Allow auto-merge ✓
#   2. Settings → Branches → branch protection on 'main':
#      - Require status checks: CI + enforce-dev-to-main
#      - Require branches to be up to date before merging

name: Auto PR — dev → main (reusable)

on:
  workflow_call:

jobs:
  create-pr:
    name: Create PR to main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create or update PR (dev → main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Skip if dev has no commits ahead of main
          AHEAD=$(gh api "repos/$GH_REPO/compare/main...dev" --jq '.ahead_by')
          if [ "$AHEAD" = "0" ]; then
            echo "dev is already in sync with main — nothing to do"
            exit 0
          fi
          echo "dev is $AHEAD commit(s) ahead of main"

          # Check for existing open PR
          PR_NUMBER=$(gh pr list \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "PR #$PR_NUMBER already exists — ensuring auto-merge is enabled"
          else
            BODY="Automated PR: dev -> main. Auto-merge enabled - merge-commits when all required checks pass (CI + enforce-dev-to-main)."
            gh pr create \
              --base main \
              --head dev \
              --title "chore: sync dev -> main" \
              --body "$BODY"

            PR_NUMBER=$(gh pr list \
              --base main \
              --head dev \
              --state open \
              --json number \
              --jq '.[0].number')
            echo "Created PR #$PR_NUMBER"
          fi

          gh pr merge "$PR_NUMBER" --auto --merge
          echo "Auto-merge (merge commit) enabled on PR #$PR_NUMBER"
