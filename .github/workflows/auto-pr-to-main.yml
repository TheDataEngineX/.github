name: Auto PR — feature → main (reusable)

on:
  workflow_call:

jobs:
  create-pr:
    name: Create PR to main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create or update PR (feature/fix → main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD: ${{ github.ref_name }}
        run: |
          # Derive conventional commit title from branch name
          # feature/feat-add-pipeline → "feat: add pipeline"
          # feature/add-pipeline      → "feat: add pipeline"
          # fix/fix-null-ptr          → "fix: null ptr"
          BRANCH_DESC=$(echo "$HEAD" | sed 's|^feature/||;s|^fix/||')
          if echo "$BRANCH_DESC" | grep -qE '^feat-'; then
            TITLE="feat: $(echo "$BRANCH_DESC" | sed 's|^feat-||;s|-| |g')"
          elif echo "$BRANCH_DESC" | grep -qE '^fix-'; then
            TITLE="fix: $(echo "$BRANCH_DESC" | sed 's|^fix-||;s|-| |g')"
          elif echo "$HEAD" | grep -qE '^fix/'; then
            TITLE="fix: $(echo "$BRANCH_DESC" | sed 's|-| |g')"
          else
            TITLE="feat: $(echo "$BRANCH_DESC" | sed 's|-| |g')"
          fi

          echo "PR title: $TITLE"

          PR_NUMBER=$(gh pr list \
            --base main \
            --head "$HEAD" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "PR #$PR_NUMBER already exists"
          else
            BODY="Automated PR: ${HEAD} → main. Review the preview environment before merging."
            gh pr create \
              --base main \
              --head "$HEAD" \
              --title "$TITLE" \
              --body "$BODY"

            PR_NUMBER=$(gh pr list \
              --base main \
              --head "$HEAD" \
              --state open \
              --json number \
              --jq '.[0].number')
            echo "Created PR #$PR_NUMBER"
          fi
