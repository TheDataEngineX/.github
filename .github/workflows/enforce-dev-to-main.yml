# Reusable workflow — called from each repo's .github/workflows/enforce-dev-to-main.yml
# Logic lives here once; repo files are thin callers.

name: Enforce dev-to-main (reusable)

on:
  workflow_call:

jobs:
  check-source-branch:
    name: Verify PR source is dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check source branch
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "PRs to main must come from the 'dev' branch."
            echo "Source branch: ${{ github.head_ref }}"
            exit 1
          fi
          echo "Source branch is 'dev' — OK"
