# Reusable workflow — called from each repo's .github/workflows/enforce-dev-to-main.yml
# Logic lives here once; repo files are thin callers.

name: Enforce dev-to-main (reusable)

on:
  workflow_call:

jobs:
  check-source-branch:
    name: Verify PR source is dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check source branch
        run: |
          branch="${{ github.head_ref }}"
          if [ "$branch" != "dev" ] && [[ "$branch" != release-please--* ]]; then
            echo "PRs to main must come from 'dev' or a release-please branch."
            echo "Source branch: $branch"
            exit 1
          fi
          echo "Source branch is '$branch' — OK"
